apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-service
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/portfolio-management-platform.git
    targetRevision: main
    path: deployment/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: vrdcapital
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
