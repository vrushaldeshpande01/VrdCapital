apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vrdcapital

resources:
  - ../k8s/base/namespace.yaml
  - ../k8s/base/auth-service.yaml
  - ../k8s/base/client-service.yaml
  - ../k8s/base/ingress.yaml

configMapGenerator:
  - name: vrdcapital-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO

images:
  - name: auth-service
    newName: YOUR_ECR_REGISTRY/vrdcapital/auth-service
    newTag: latest
  - name: client-service
    newName: YOUR_ECR_REGISTRY/vrdcapital/client-service
    newTag: latest
