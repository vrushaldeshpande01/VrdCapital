# Helm values for kube-prometheus-stack
# Installs: Prometheus + Grafana + Alertmanager + node-exporter + kube-state-metrics
#
# Install:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     --values deployment/monitoring/helm/kube-prometheus-stack-values.yaml

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi

    # Auto-discover all pods with prometheus.io/scrape=true annotation
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

    additionalScrapeConfigs:
      - job_name: vrdcapital-services
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [vrdcapital]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: service

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: "${GRAFANA_PASSWORD}"  # set via --set or secrets

  persistence:
    enabled: true
    storageClassName: gp2
    size: 5Gi

  # Load our existing VrdCapital dashboard from ConfigMap
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: vrdcapital
          orgId: 1
          folder: VrdCapital
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/vrdcapital

  dashboardsConfigMaps:
    vrdcapital: vrdcapital-dashboards

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki:3100
      access: proxy
      isDefault: false

  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana"
      serve_from_sub_path: true
    auth.anonymous:
      enabled: false

# ── Alertmanager ──────────────────────────────────────────────────────────────
alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 2Gi

  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: [alertname, service]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: default
    receivers:
      - name: default
        # Add Slack/email config here when ready
        # slack_configs:
        #   - api_url: "<SLACK_WEBHOOK_URL>"
        #     channel: "#devops-alerts"

# ── Node Exporter ─────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ── Kube State Metrics ────────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true
