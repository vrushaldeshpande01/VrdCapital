# PrometheusRule — VrdCapital application alert rules
# Applied automatically by kube-prometheus-stack operator
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vrdcapital-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:

    - name: vrdcapital.pods
      rules:
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="vrdcapital"}[5m]) > 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "{{ $labels.container }} in {{ $labels.pod }} has restarted more than once in 5 minutes."

        - alert: PodNotReady
          expr: kube_pod_status_ready{namespace="vrdcapital", condition="true"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is not ready"
            description: "{{ $labels.pod }} has been in a non-ready state for more than 5 minutes."

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas{namespace="vrdcapital"}
            != kube_deployment_status_available_replicas{namespace="vrdcapital"}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.deployment }} has unavailable replicas"
            description: "Expected {{ $value }} replicas but some are unavailable."

    - name: vrdcapital.services
      rules:
        - alert: ServiceHighErrorRate
          expr: |
            rate(http_requests_total{namespace="vrdcapital", status=~"5.."}[5m])
            / rate(http_requests_total{namespace="vrdcapital"}[5m]) > 0.05
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "High error rate on {{ $labels.service }}"
            description: "{{ $labels.service }} has >5% error rate for 2 minutes."

        - alert: ServiceHighLatency
          expr: |
            histogram_quantile(0.95,
              rate(http_request_duration_seconds_bucket{namespace="vrdcapital"}[5m])
            ) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High latency on {{ $labels.service }}"
            description: "p95 latency on {{ $labels.service }} > 2s for 5 minutes."

        - alert: ServiceDown
          expr: up{job=~"auth-service|client-service|portfolio-service|broker-service|order-service|notification-service|report-service"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Service {{ $labels.job }} is down"
            description: "{{ $labels.job }} has been unreachable for 1 minute."

    - name: vrdcapital.broker
      rules:
        - alert: ZerodhaTokenExpired
          expr: |
            rate(http_requests_total{service="broker-service", status="401"}[5m]) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Zerodha access token expired"
            description: "broker-service is receiving 401 responses from Zerodha API. Re-authenticate at /api/v1/broker/zerodha/login."

        - alert: OrderServiceHighFailureRate
          expr: |
            rate(http_requests_total{service="order-service", status=~"4..|5.."}[5m])
            / rate(http_requests_total{service="order-service"}[5m]) > 0.10
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "High order failure rate"
            description: "order-service has >10% failure rate — check Zerodha connection and logs."

    - name: vrdcapital.infrastructure
      rules:
        - alert: HighCPUUsage
          expr: |
            rate(container_cpu_usage_seconds_total{namespace="vrdcapital", container!=""}[5m]) > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU on {{ $labels.container }}"
            description: "{{ $labels.container }} is using >80% CPU for 5 minutes."

        - alert: HighMemoryUsage
          expr: |
            container_memory_working_set_bytes{namespace="vrdcapital", container!=""}
            / container_spec_memory_limit_bytes{namespace="vrdcapital", container!=""} > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory on {{ $labels.container }}"
            description: "{{ $labels.container }} is using >85% of memory limit."

        - alert: PersistentVolumeAlmostFull
          expr: |
            kubelet_volume_stats_available_bytes{namespace="vrdcapital"}
            / kubelet_volume_stats_capacity_bytes{namespace="vrdcapital"} < 0.15
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} almost full"
            description: "Less than 15% disk space remaining on {{ $labels.persistentvolumeclaim }}."
