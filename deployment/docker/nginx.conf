events {
    worker_connections 1024;
}

http {
    # Docker's internal DNS — re-resolve service names every 10s.
    # Effective only when proxy_pass uses a variable (set $var),
    # which all locations below now do — so service restarts with
    # new IPs are picked up automatically without nginx reload.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # Variable-based proxy_pass with explicit rewrite so the location
        # prefix is stripped before forwarding. Without rewrite, nginx does
        # not perform prefix substitution when proxy_pass contains a variable.
        location /api/auth/ {
            set $upstream "auth-service:8000";
            rewrite ^/api/auth/(.*)$ /$1 break;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/portfolio/ {
            set $upstream "portfolio-service:8000";
            rewrite ^/api/portfolio/(.*)$ /$1 break;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/clients/ {
            set $upstream "client-service:8000";
            rewrite ^/api/clients/(.*)$ /$1 break;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/broker/ {
            set $upstream "broker-service:8000";
            rewrite ^/api/broker/(.*)$ /$1 break;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/orders/ {
            set $upstream "order-service:8000";
            rewrite ^/api/orders/(.*)$ /$1 break;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/reports/ {
            set $upstream "report-service:8000";
            rewrite ^/api/reports/(.*)$ /$1 break;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /api/notifications/ {
            set $upstream "notification-service:8000";
            rewrite ^/api/notifications/(.*)$ /$1 break;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket for notifications. Notification service mounts its router at /api/v1,
        # so /ws/notifications → /api/v1/ws/notifications on the service.
        location /ws/ {
            set $upstream "notification-service:8000";
            rewrite ^/ws/(.*)$ /api/v1/ws/$1 break;
            proxy_pass http://$upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # Grafana — keep /grafana/ prefix as Grafana expects it
        location /grafana/ {
            set $upstream "grafana:3000";
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Frontend — pass full URI as-is
        location / {
            set $upstream "frontend:3000";
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
