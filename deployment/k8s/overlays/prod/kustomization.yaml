apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vrdcapital

bases:
  - ../../base

# Jenkins replaces these image tags on each build via:
#   kustomize edit set image <name>=<ecr-url>:<git-sha>
images:
  - name: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/vrdcapital/auth-service
    newTag: latest
  - name: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/vrdcapital/client-service
    newTag: latest
  - name: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/vrdcapital/portfolio-service
    newTag: latest
  - name: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/vrdcapital/broker-service
    newTag: latest
  - name: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/vrdcapital/order-service
    newTag: latest
  - name: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/vrdcapital/notification-service
    newTag: latest
  - name: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/vrdcapital/report-service
    newTag: latest
  - name: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/vrdcapital/frontend
    newTag: latest

patches:
  - path: patches/replicas.yaml
  - path: patches/resources.yaml
  # Uncomment when domain + ACM cert are ready (see patches/ingress-tls.yaml):
  # - path: patches/ingress-tls.yaml
