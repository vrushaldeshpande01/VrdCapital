          protocol: UDP

# ── frontend ───────────────────────────────────────────────────────────────────
# Accepts from: public internet (via ALB) + monitoring
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-netpol
  namespace: vrdcapital
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 80
          protocol: TCP
  egress:
    - ports:
        - port: 8001
          protocol: TCP
        - port: 8002
          protocol: TCP
        - port: 8003
          protocol: TCP
        - port: 8004
          protocol: TCP
        - port: 8005
          protocol: TCP
        - port: 8007
          protocol: TCP
        - port: 53
          protocol: UDP

# ── rabbitmq ───────────────────────────────────────────────────────────────────
# Accepts from: order-service and notification-service only
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rabbitmq-netpol
  namespace: vrdcapital
spec:
  podSelector:
    matchLabels:
      app: rabbitmq
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: order-service
        - podSelector:
            matchLabels:
              app: notification-service
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 5672    # AMQP
          protocol: TCP
        - port: 15672   # Management UI (monitoring only)
          protocol: TCP
  egress:
    - ports:
        - port: 53
          protocol: UDP
