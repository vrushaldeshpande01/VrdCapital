            matchLabels:
              app: frontend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8007
          protocol: TCP
  egress:
    - ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 8001    # auth-service
          protocol: TCP
        - port: 8003    # portfolio-service
          protocol: TCP
        - port: 443     # S3 for report upload
          protocol: TCP
