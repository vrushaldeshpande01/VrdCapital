  namespace: vrdcapital
spec:
  podSelector:
    matchLabels:
      app: broker-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - podSelector:
            matchLabels:
              app: portfolio-service
        - podSelector:
            matchLabels:
              app: order-service
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8004
          protocol: TCP
  egress:
    - ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 8001    # auth-service
          protocol: TCP
        - port: 443     # Zerodha API + AWS SDK
          protocol: TCP
        - port: 53
          protocol: UDP

# ── order-service ──────────────────────────────────────────────────────────────
# Accepts from: frontend + monitoring
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: order-service-netpol
  namespace: vrdcapital
spec:
  podSelector:
    matchLabels:
      app: order-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8005
          protocol: TCP
  egress:
    - ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 8001    # auth-service
          protocol: TCP
        - port: 8003    # portfolio-service
          protocol: TCP
        - port: 8004    # broker-service
          protocol: TCP
        - port: 8006    # notification-service
          protocol: TCP
        - port: 5672    # RabbitMQ AMQP
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 53
          protocol: UDP

# ── notification-service ───────────────────────────────────────────────────────
# Accepts from: order-service + monitoring (no frontend direct access)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: notification-service-netpol
  namespace: vrdcapital
spec:
  podSelector:
    matchLabels:
      app: notification-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: order-service
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8006
          protocol: TCP
  egress:
    - ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 8001    # auth-service
          protocol: TCP
        - port: 5672    # RabbitMQ AMQP (consuming notifications)
          protocol: TCP
        - port: 587     # SMTP for email notifications
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 53
          protocol: UDP

# ── report-service ─────────────────────────────────────────────────────────────
# Accepts from: frontend + monitoring
---
