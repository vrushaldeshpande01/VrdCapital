apiVersion: v1
kind: ConfigMap
metadata:
  name: vrdcapital-config
  namespace: vrdcapital
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"

  # Inter-service URLs — Kubernetes DNS (service-name.namespace.svc.cluster.local)
  AUTH_SERVICE_URL: "http://auth-service:8001"
  CLIENT_SERVICE_URL: "http://client-service:8002"
  PORTFOLIO_SERVICE_URL: "http://portfolio-service:8003"
  BROKER_SERVICE_URL: "http://broker-service:8004"
  ORDER_SERVICE_URL: "http://order-service:8005"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8006"
  REPORT_SERVICE_URL: "http://report-service:8007"

  # RabbitMQ in-cluster DNS
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"

  # Frontend
  VITE_APP_NAME: "VrdCapital"
