apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-service
  namespace: vrdcapital
  labels:
    app: client-service
    version: v1
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client-service
  template:
    metadata:
      labels:
        app: client-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: vrdcapital-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: client-service
          image: YOUR_ECR_REGISTRY/vrdcapital/client-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ENVIRONMENT
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vrdcapital-db-secret
                  key: client-service-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: vrdcapital-redis-secret
                  key: url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: vrdcapital-jwt-secret
                  key: secret-key
            - name: AUTH_SERVICE_URL
              value: http://auth-service
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: client-service
  namespace: vrdcapital
spec:
  selector:
    app: client-service
  ports:
    - port: 80
      targetPort: 8000
      name: http
