apiVersion: v1
kind: Namespace
metadata:
  name: vrdcapital
  labels:
    name: vrdcapital
    environment: production
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vrdcapital-sa
  namespace: vrdcapital
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/vrdcapital-eks-role
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vrdcapital-network-policy
  namespace: vrdcapital
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: vrdcapital
  egress:
    - {}
