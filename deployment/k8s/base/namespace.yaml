apiVersion: v1
kind: Namespace
metadata:
  name: vrdcapital
  labels:
    name: vrdcapital
    environment: production
---
# ServiceAccount with IRSA annotation — allows pods to read AWS Secrets Manager
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vrdcapital-sa
  namespace: vrdcapital
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/vrdcapital-prod-secrets-read
---
# NetworkPolicy — pods can only talk to each other inside the namespace
# External egress allowed (Zerodha API, ECR pulls, Secrets Manager)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-external-ingress
  namespace: vrdcapital
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: vrdcapital
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
