apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: vrdcapital
  labels:
    app: auth-service
    version: v1
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: vrdcapital-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: auth-service
          image: YOUR_ECR_REGISTRY/vrdcapital/auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ENVIRONMENT
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vrdcapital-db-secret
                  key: auth-service-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: vrdcapital-redis-secret
                  key: url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: vrdcapital-jwt-secret
                  key: secret-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: vrdcapital
spec:
  selector:
    app: auth-service
  ports:
    - port: 80
      targetPort: 8000
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: vrdcapital
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
