apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: vrdcapital
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8001"
    spec:
      serviceAccountName: vrdcapital-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: auth-service
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/vrdcapital/auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - configMapRef:
                name: vrdcapital-config
            - secretRef:
                name: vrdcapital-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: vrdcapital
spec:
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  type: ClusterIP
