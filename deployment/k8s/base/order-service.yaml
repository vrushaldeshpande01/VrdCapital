apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: vrdcapital
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8005"
    spec:
      serviceAccountName: vrdcapital-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: order-service
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/vrdcapital/order-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8005
              name: http
          envFrom:
            - configMapRef:
                name: vrdcapital-config
            - secretRef:
                name: vrdcapital-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live
              port: 8005
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: vrdcapital
spec:
  selector:
    app: order-service
  ports:
    - port: 8005
      targetPort: 8005
      name: http
  type: ClusterIP
