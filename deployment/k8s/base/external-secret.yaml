# ExternalSecrets operator — pulls from AWS Secrets Manager into a K8s Secret.
# Install ExternalSecrets operator first:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: vrdcapital
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: vrdcapital-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vrdcapital-secrets
  namespace: vrdcapital
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: vrdcapital-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: vrdcapital/prod/app
