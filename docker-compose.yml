version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: vrdcapital-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vrdcapital}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vrdcapital-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vrdcapital-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vrdcapital-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vrdcapital-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER must be set in .env}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set in .env}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vrdcapital-network
    restart: unless-stopped

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: vrdcapital-auth
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SERVICE_NAME: auth-service
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/shared:/app/shared
    networks:
      - vrdcapital-network
    restart: unless-stopped

  client-service:
    build:
      context: ./services/client-service
      dockerfile: Dockerfile
    container_name: vrdcapital-client
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      SECRET_KEY: ${SECRET_KEY}
      AUTH_SERVICE_URL: http://auth-service:8000
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SERVICE_NAME: client-service
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    volumes:
      - ./services/shared:/app/shared
    networks:
      - vrdcapital-network
    restart: unless-stopped

  portfolio-service:
    build:
      context: ./services/portfolio-service
      dockerfile: Dockerfile
    container_name: vrdcapital-portfolio
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
      AUTH_SERVICE_URL: http://auth-service:8000
      CLIENT_SERVICE_URL: http://client-service:8000
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SERVICE_NAME: portfolio-service
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      client-service:
        condition: service_started
    networks:
      - vrdcapital-network
    restart: unless-stopped

  broker-service:
    build:
      context: ./services/broker-service
      dockerfile: Dockerfile
    container_name: vrdcapital-broker
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
      SECRET_KEY: ${SECRET_KEY}
      AUTH_SERVICE_URL: http://auth-service:8000
      PORTFOLIO_SERVICE_URL: http://portfolio-service:8000
      CLIENT_SERVICE_URL: http://client-service:8000
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SERVICE_NAME: broker-service
      ZERODHA_API_KEY: ${ZERODHA_API_KEY:-}
      ZERODHA_API_SECRET: ${ZERODHA_API_SECRET:-}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
    ports:
      - "8004:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      portfolio-service:
        condition: service_started
    networks:
      - vrdcapital-network
    restart: unless-stopped

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: vrdcapital-order
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      AUTH_SERVICE_URL: http://auth-service:8000
      BROKER_SERVICE_URL: http://broker-service:8000
      CLIENT_SERVICE_URL: http://client-service:8000
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    ports:
      - "8005:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      broker-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - vrdcapital-network
    restart: unless-stopped

  report-service:
    build:
      context: ./services/report-service
      dockerfile: Dockerfile
    container_name: vrdcapital-report
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      AUTH_SERVICE_URL: http://auth-service:8000
      PORTFOLIO_SERVICE_URL: http://portfolio-service:8000
      CLIENT_SERVICE_URL: http://client-service:8000
      ORDER_SERVICE_URL: http://order-service:8000
    ports:
      - "8007:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      portfolio-service:
        condition: service_started
    networks:
      - vrdcapital-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: vrdcapital-notification
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      AUTH_SERVICE_URL: http://auth-service:8000
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    ports:
      - "8006:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - vrdcapital-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: vrdcapital-nginx
    ports:
      - "80:80"
    volumes:
      - ./deployment/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - client-service
      - portfolio-service
      - order-service
    networks:
      - vrdcapital-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vrdcapital-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost/api}
      VITE_APP_NAME: VrdCapital
    networks:
      - vrdcapital-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: vrdcapital-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --storage.tsdb.retention.time=7d
    ports:
      - "9090:9090"
    volumes:
      - ./deployment/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - vrdcapital-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: vrdcapital-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployment/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployment/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - vrdcapital-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  vrdcapital-network:
    driver: bridge
