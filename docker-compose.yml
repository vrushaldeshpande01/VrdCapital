version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: vrdcapital-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vrdcapital}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vrdcapital123}
      POSTGRES_DB: ${POSTGRES_DB:-vrdcapital}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vrdcapital"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vrdcapital-network

  redis:
    image: redis:7-alpine
    container_name: vrdcapital-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vrdcapital-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vrdcapital-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-vrdcapital}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq123}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vrdcapital-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: vrdcapital-auth
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vrdcapital}:${POSTGRES_PASSWORD:-vrdcapital123}@postgres:5432/${POSTGRES_DB:-vrdcapital}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-supersecretkey-change-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SERVICE_NAME: auth-service
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/shared:/app/shared
    networks:
      - vrdcapital-network
    restart: unless-stopped

  client-service:
    build:
      context: ./services/client-service
      dockerfile: Dockerfile
    container_name: vrdcapital-client
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vrdcapital}:${POSTGRES_PASSWORD:-vrdcapital123}@postgres:5432/${POSTGRES_DB:-vrdcapital}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-supersecretkey-change-in-production}
      AUTH_SERVICE_URL: http://auth-service:8000
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SERVICE_NAME: client-service
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    volumes:
      - ./services/shared:/app/shared
    networks:
      - vrdcapital-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: vrdcapital-nginx
    ports:
      - "80:80"
    volumes:
      - ./deployment/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - client-service
    networks:
      - vrdcapital-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vrdcapital-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost/api}
      VITE_APP_NAME: VrdCapital
    networks:
      - vrdcapital-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  vrdcapital-network:
    driver: bridge
